<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch 直立觀看台 (首頁儀表板版)</title>
    <style>
        /* 基礎歸零與深色背景 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0e0e10;
            color: #efeff1;
            font-family: sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* 頂部控制列 (加入吸頂效果) */
        #controls {
            display: flex;
            padding: 10px;
            background-color: #18181b;
            border-bottom: 1px solid #303032;
            gap: 10px;
            height: 60px; 
            align-items: center;
            position: sticky; /* 往下滾動時固定在最上方 */
            top: 0;
            z-index: 10000;
        }
        #controls input {
            flex: 1;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #000;
            color: #fff;
            font-size: 16px;
        }
        button {
            padding: 8px 16px;
            background-color: #9146FF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #a970ff; }
        
        /* 回首頁與功能按鈕的特別樣式 */
        #home-btn { background-color: #3a3a3d; }
        #home-btn:hover { background-color: #555558; }
        #toggle-chat-btn { background-color: #3a3a3d; }
        #toggle-chat-btn:hover { background-color: #555558; }

        /* 首頁追隨列表區塊 */
        #home-screen {
            width: 100vw;
            min-height: calc(100vh - 60px);
            padding: 30px;
            display: block; 
        }
        
        /* 實況主卡片網格系統 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .stream-card {
            background: #18181b;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid transparent;
        }
        .stream-card:hover {
            transform: translateY(-5px);
            border: 1px solid #9146FF;
        }
        .stream-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .card-info { padding: 15px; }
        .card-info h3 { margin-bottom: 5px; font-size: 18px; }
        .card-info p { color: #adadb8; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* 遊戲標籤與觀看人數 */
        .game-tag {
            display: inline-block;
            background-color: #3a3a3d;
            color: #efeff1;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 8px;
            margin-right: 8px;
        }
        .viewer-count { color: #eb0400 !important; font-weight: bold; margin-top: 8px; display: inline-block;}

        /* 第一屏：影片區塊 (預設隱藏) */
        #video-container {
            width: 100vw;
            height: calc(100vh - 60px); /* 扣掉頂部控制列，佔滿畫面 */
            background-color: #000;
            display: none;
            transition: height 0.3s ease; /* 縮放時加入一點動畫感 */
        }
        
        /* 第二屏：聊天室區塊 (預設隱藏) */
        #chat-container {
            width: 100vw;
            height: 100vh; /* 完整一整個螢幕的高度 */
            border-top: 2px solid #9146FF;
            display: none;
        }

        iframe { width: 100%; height: 100%; border: none; }
        
        /* 登入畫面置中 */
        .login-wrapper { text-align: center; margin-top: 15vh; }
    </style>
</head>
<body>

    <!-- 控制列 -->
    <div id="controls">
        <button id="home-btn" onclick="goHome()">🏠 回首頁</button>
        <input type="text" id="channelInput" placeholder="直接輸入 ID 搜尋" onkeypress="handleEnter(event)">
        <button onclick="changeChannelFromInput()">前往頻道</button>
        <!-- 一鍵開關聊天室的按鈕 (預設隱藏) -->
        <button id="toggle-chat-btn" onclick="toggleChat()" style="display: none;">💬 關閉聊天</button>
    </div>

    <!-- 首頁：顯示追隨名單 -->
    <div id="home-screen">
        <div class="login-wrapper" id="login-section">
            <h2 style="margin-bottom: 20px;">需要授權才能讀取你的追隨名單</h2>
            <button onclick="loginTwitch()">連結 Twitch 帳號</button>
        </div>
        <div id="live-streams-grid" class="grid-container"></div>
    </div>

    <!-- 影片 -->
    <div id="video-container">
        <iframe id="video-frame" src="" allowfullscreen="true"></iframe>
    </div>

    <!-- 聊天室 -->
    <div id="chat-container">
        <iframe id="chat-frame" src=""></iframe>
    </div>

    <script>
        // =========================================================================
        const CLIENT_ID = 'p6qh37n16a7vomp2rufyaa3ak2a5wc'; 
        const REDIRECT_URI = 'https://winsyi531.github.io/my-twitch-dashboard/';
        // =========================================================================
        
        let accessToken = localStorage.getItem('twitch_token');
        let isChatVisible = true; 
        
        // 1. 檢查登入回傳的 token
        const hash = window.location.hash;
        if (hash.includes('access_token=')) {
            accessToken = new URLSearchParams(hash.substring(1)).get('access_token');
            localStorage.setItem('twitch_token', accessToken);
            // 清理網址列，讓畫面保持乾淨 (但保留 ?channel 等參數)
            history.replaceState(null, '', window.location.pathname + window.location.search);
        }
        
        // 2. 程式啟動邏輯 (F5 重新整理時會跑到這裡)
        if (accessToken) {
            document.getElementById('login-section').style.display = 'none';
            
            // ⭐ 讀取網址列看看有沒有 "?channel=頻道ID"
            const urlParams = new URLSearchParams(window.location.search);
            const targetChannel = urlParams.get('channel');
            
            if (targetChannel) {
                // 如果網址有紀錄頻道，直接進頻道 (傳入 true 代表是從網址載入的，不用再改寫一次網址)
                openChannel(targetChannel, true);
            } else {
                // 如果沒有，就乖乖載入首頁
                fetchLiveStreams();
            }
        }
        
        function loginTwitch() {
            if (CLIENT_ID === '這裡填入你的_CLIENT_ID') {
                alert("請先在程式碼中填入你的 CLIENT_ID！");
                return;
            }
            const authUrl = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=user:read:follows`;
            window.location.href = authUrl;
        }
        
        async function fetchLiveStreams() {
            try {
                const userRes = await fetch('https://api.twitch.tv/helix/users', {
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': CLIENT_ID }
                });
                if (!userRes.ok) throw new Error('Token 可能過期了');
                const userData = await userRes.json();
                const userId = userData.data[0].id;
        
                const streamsRes = await fetch(`https://api.twitch.tv/helix/streams/followed?user_id=${userId}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': CLIENT_ID }
                });
                const streamsData = await streamsRes.json();
                renderGrid(streamsData.data);
            } catch (error) {
                console.error("API 錯誤:", error);
                localStorage.removeItem('twitch_token');
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('login-section').innerHTML += '<p style="color:red; margin-top:10px;">授權已過期，請重新登入</p>';
            }
        }
        
        function renderGrid(streams) {
            const grid = document.getElementById('live-streams-grid');
            if (!streams || streams.length === 0) {
                grid.innerHTML = '<h3 style="grid-column: 1 / -1; text-align: center; color: #adadb8; margin-top: 50px;">目前沒有追隨的實況主在線上 😴</h3>';
                return;
            }
        
            let html = '';
            streams.forEach(stream => {
                const thumbnailUrl = stream.thumbnail_url.replace('{width}', '440').replace('{height}', '248');
                html += `
                    <div class="stream-card" onclick="openChannel('${stream.user_login}')">
                        <img src="${thumbnailUrl}" alt="${stream.user_name}">
                        <div class="card-info">
                            <h3>${stream.user_name}</h3>
                            <p>${stream.title}</p>
                            <span class="game-tag">🎮 ${stream.game_name || 'Just Chatting'}</span>
                            <span class="viewer-count">🔴 ${stream.viewer_count.toLocaleString()} 人正在觀看</span>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }
        
        function changeChannelFromInput() {
            const channel = document.getElementById('channelInput').value.trim().toLowerCase();
            if (channel) openChannel(channel);
        }
        
        // ⭐ openChannel 多收一個參數 isFromUrl，避免陷入網址無限修改的迴圈
        function openChannel(channel, isFromUrl = false) {
            document.getElementById('home-screen').style.display = 'none';
            
            isChatVisible = true;
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('video-container').style.height = 'calc(100vh - 60px)';
            document.getElementById('chat-container').style.display = 'block';
            
            const toggleBtn = document.getElementById('toggle-chat-btn');
            toggleBtn.style.display = 'block';
            toggleBtn.innerText = '💬 關閉聊天';
        
            document.getElementById('video-frame').src = `https://player.twitch.tv/?channel=${channel}&parent=winsyi531.github.io`;
            document.getElementById('chat-frame').src = `https://www.twitch.tv/embed/${channel}/chat?parent=winsyi531.github.io&darkpopout`;
            
            // ⭐ 修改分頁標籤名稱
            document.title = `${channel} | Twitch 直立觀看台`;
        
            // ⭐ 動態修改網址列，加上 ?channel=頻道名稱 (不重新載入網頁)
            if (!isFromUrl) {
                const newUrl = window.location.pathname + "?channel=" + channel;
                history.pushState(null, '', newUrl);
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function toggleChat() {
            isChatVisible = !isChatVisible;
            const chatContainer = document.getElementById('chat-container');
            const videoContainer = document.getElementById('video-container');
            const toggleBtn = document.getElementById('toggle-chat-btn');
        
            if (isChatVisible) {
                chatContainer.style.display = 'block';
                videoContainer.style.height = 'calc(100vh - 60px)'; 
                toggleBtn.innerText = '💬 關閉聊天';
            } else {
                chatContainer.style.display = 'none';
                videoContainer.style.height = '100vh'; 
                toggleBtn.innerText = '💬 開啟聊天';
            }
        }
        
        // ⭐ goHome 也加入復原網址和標題的邏輯
        function goHome(isFromBrowserBack = false) {
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'none';
            document.getElementById('toggle-chat-btn').style.display = 'none'; 
            
            document.getElementById('video-frame').src = '';
            document.getElementById('chat-frame').src = '';
            
            // ⭐ 把分頁標題改回來
            document.title = 'Twitch 直立觀看台 (首頁儀表板版)';
        
            // ⭐ 把網址列後面的 ?channel 參數清掉，恢復乾淨網址
            if (!isFromBrowserBack) {
                history.pushState(null, '', window.location.pathname);
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (accessToken) fetchLiveStreams();
        }
        
        function handleEnter(e) {
            if (e.key === 'Enter') changeChannelFromInput();
        }
        
        // 支援瀏覽器的「上一頁/下一頁」按鈕
        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const channel = urlParams.get('channel');
            if (channel) {
                openChannel(channel, true);
            } else {
                goHome(true);
            }
        });
        
        setInterval(() => {
            if (document.getElementById('home-screen').style.display !== 'none' && accessToken) {
                console.log('自動更新追隨名單...');
                fetchLiveStreams();
            }
        }, 3 * 60 * 1000); 
    </script>
</body>
</html>
