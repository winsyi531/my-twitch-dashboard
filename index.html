<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch 直立觀看台</title>
    <style>
        /* 基礎歸零與深色背景 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0e0e10;
            color: #efeff1;
            font-family: sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* 頂部控制列 (加入吸頂效果，絕對不換行) */
        #controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            background-color: #18181b;
            border-bottom: 1px solid #303032;
            height: 60px; 
            position: sticky; 
            top: 0;
            z-index: 10000;
            flex-wrap: nowrap; 
            /* ⚠️ 移除了 overflow-x: auto，這樣下拉選單才不會被裁切掉！ */
        }

        /* 將控制列分為左、中、右三個區塊，完美置中對齊 */
        .left-controls { display: flex; gap: 10px; flex: 1; align-items: center; white-space: nowrap; }
        .center-controls { display: flex; gap: 15px; flex: 2; justify-content: center; align-items: center; white-space: nowrap; }
        .right-controls { display: flex; gap: 10px; flex: 1; justify-content: flex-end; align-items: center; white-space: nowrap; }

        /* 統一按鈕與超連結的外觀 */
        .btn {
            display: inline-block;
            padding: 8px 16px;
            background-color: #9146FF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            text-decoration: none; 
            transition: background-color 0.2s;
            line-height: normal;
            white-space: nowrap; 
            flex-shrink: 0; /* 防止按鈕被過度擠壓 */
        }
        .btn:hover { background-color: #a970ff; }
        
        #home-btn { background-color: #3a3a3d; }
        #home-btn:hover { background-color: #555558; }
        #switcher-btn { background-color: #9146FF; }
        #switcher-btn:hover { background-color: #a970ff; }
        #toggle-chat-btn { background-color: #3a3a3d; }
        #toggle-chat-btn:hover { background-color: #555558; }

        /* 酷炫發光標籤 (分類 & 開台時長) */
        .cool-badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid;
            flex-shrink: 0;
        }
        .game-badge {
            background: rgba(145, 70, 255, 0.15);
            border-color: rgba(145, 70, 255, 0.6);
            box-shadow: 0 0 8px rgba(145, 70, 255, 0.3);
            color: #e5c3ff;
        }
        .uptime-badge {
            background: rgba(235, 4, 0, 0.15);
            border-color: rgba(235, 4, 0, 0.6);
            box-shadow: 0 0 8px rgba(235, 4, 0, 0.3);
            color: #ffb3b2;
        }

        /* 懸浮快速換台選單 (Dropdown) */
        #quick-switcher-menu {
            position: absolute;
            top: 60px; 
            left: 15px; /* 對齊左側按鈕群 */
            width: 300px;
            max-height: 60vh;
            background-color: #18181b;
            border: 1px solid #464649;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            overflow-y: auto;
            z-index: 10001;
            display: none; 
            flex-direction: column;
        }
        .mini-card {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #262629;
            text-decoration: none;
            color: #efeff1;
            transition: background 0.2s;
        }
        .mini-card:hover { background-color: #262629; border-left: 3px solid #9146FF; }
        .mini-card img { width: 80px; border-radius: 4px; margin-right: 12px; aspect-ratio: 16/9; object-fit: cover; }
        .mini-info { flex: 1; overflow: hidden; }
        .mini-info h4 { font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-info p { font-size: 12px; color: #adadb8; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .mini-viewers { font-size: 12px; color: #eb0400; font-weight: bold; }

        /* 首頁最後更新時間文字 */
        #last-update-text { font-size: 13px; color: #adadb8; white-space: nowrap; flex-shrink: 0; }

        /* 首頁追隨列表區塊 */
        #home-screen { width: 100vw; min-height: calc(100vh - 60px); padding: 30px; display: block; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .stream-card {
            background: #18181b; border-radius: 8px; overflow: hidden; cursor: pointer;
            transition: transform 0.2s; border: 1px solid transparent; text-decoration: none; 
            color: inherit; display: block;
        }
        .stream-card:hover { transform: translateY(-5px); border: 1px solid #9146FF; }
        .stream-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-info h3 { margin-bottom: 5px; font-size: 18px; }
        .card-info p { color: #adadb8; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-tag { display: inline-block; background-color: #3a3a3d; color: #efeff1; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-top: 8px; margin-right: 8px; }
        .viewer-count { color: #eb0400 !important; font-weight: bold; margin-top: 8px; display: inline-block;}

        /* 影片與聊天室區塊 */
        #video-container { width: 100vw; height: calc(100vh - 60px); background-color: #000; display: none; transition: height 0.3s ease; }
        #chat-container { width: 100vw; height: 100vh; border-top: 2px solid #9146FF; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
        .login-wrapper { text-align: center; margin-top: 15vh; }
    </style>
</head>
<body>

    <!-- 控制列 -->
    <div id="controls">
        <!-- 左側：回首頁 & 其他開台清單 -->
        <div class="left-controls">
            <a href="?" id="home-btn" class="btn" onclick="handleHomeClick(event)">🏠 回首頁</a>
            <button id="switcher-btn" class="btn" onclick="toggleSwitcher(event)" style="display: none;">🔴 其他開台清單 ▾</button>
        </div>

        <!-- 中間：酷炫字卡 (僅在實況畫面顯示，自動置中) -->
        <div class="center-controls" id="stream-info-badges" style="display: none;">
            <span class="cool-badge game-badge" id="badge-game">🎮 載入中</span>
            <span class="cool-badge uptime-badge" id="badge-uptime">⏱️ 計算中</span>
        </div>

        <!-- 右側：最後更新時間 OR 關閉聊天按鈕 -->
        <div class="right-controls">
            <span id="last-update-text">🔄 尚未更新</span>
            <!-- 關閉聊天按鈕乖乖待在右側 -->
            <button id="toggle-chat-btn" class="btn" onclick="toggleChat()" style="display: none;">💬 關閉聊天</button>
        </div>

        <!-- 懸浮快速換台選單 -->
        <div id="quick-switcher-menu"></div>
    </div>

    <!-- 首頁 -->
    <div id="home-screen">
        <div class="login-wrapper" id="login-section">
            <h2 style="margin-bottom: 20px;">需要授權才能讀取你的追隨名單</h2>
            <button class="btn" onclick="loginTwitch()">連結 Twitch 帳號</button>
        </div>
        <div id="live-streams-grid" class="grid-container"></div>
    </div>

    <!-- 影片 -->
    <div id="video-container">
        <iframe id="video-frame" src="" allowfullscreen="true"></iframe>
    </div>

    <!-- 聊天室 -->
    <div id="chat-container">
        <iframe id="chat-frame" src=""></iframe>
    </div>

    <script>
        // =========================================================================
        const CLIENT_ID = 'p6qh37n16a7vomp2rufyaa3ak2a5wc'; 
        const REDIRECT_URI = 'https://winsyi531.github.io/my-twitch-dashboard/';
        // =========================================================================

        let accessToken = localStorage.getItem('twitch_token');
        let isChatVisible = true; 
        
        let globalLiveStreams = []; 
        let currentStreamStartedAt = null; 
        let uptimeInterval = null; 

        const hash = window.location.hash;
        if (hash.includes('access_token=')) {
            accessToken = new URLSearchParams(hash.substring(1)).get('access_token');
            localStorage.setItem('twitch_token', accessToken);
            history.replaceState(null, '', window.location.pathname + window.location.search);
        }

        if (accessToken) {
            document.getElementById('login-section').style.display = 'none';
            const urlParams = new URLSearchParams(window.location.search);
            const targetChannel = urlParams.get('channel');
            
            fetchLiveStreams().then(() => {
                if (targetChannel) openChannel(targetChannel, true);
            });
        }

        function loginTwitch() {
            if (CLIENT_ID === '這裡填入你的_CLIENT_ID') return alert("請先在程式碼中填入你的 CLIENT_ID！");
            const authUrl = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=user:read:follows`;
            window.location.href = authUrl;
        }

        async function fetchLiveStreams() {
            try {
                const userRes = await fetch('https://api.twitch.tv/helix/users', {
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': CLIENT_ID }
                });
                if (!userRes.ok) throw new Error('Token 可能過期了');
                const userData = await userRes.json();
                const userId = userData.data[0].id;

                const streamsRes = await fetch(`https://api.twitch.tv/helix/streams/followed?user_id=${userId}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': CLIENT_ID }
                });
                const streamsData = await streamsRes.json();
                
                globalLiveStreams = streamsData.data; 
                
                renderGrid(globalLiveStreams);
                renderQuickSwitcher(globalLiveStreams);
                
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                document.getElementById('last-update-text').innerText = `🔄 最後更新於 ${timeStr}`;

                if (document.getElementById('video-container').style.display === 'block') {
                    updateCurrentStreamBadges();
                }
            } catch (error) {
                console.error("API 錯誤:", error);
                localStorage.removeItem('twitch_token');
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('login-section').innerHTML += '<p style="color:red; margin-top:10px;">授權已過期，請重新登入</p>';
            }
        }

        function renderGrid(streams) {
            const grid = document.getElementById('live-streams-grid');
            if (!streams || streams.length === 0) {
                grid.innerHTML = '<h3 style="grid-column: 1 / -1; text-align: center; color: #adadb8; margin-top: 50px;">目前沒有追隨的實況主在線上 😴</h3>';
                return;
            }

            let html = '';
            streams.forEach(stream => {
                const thumbnailUrl = stream.thumbnail_url.replace('{width}', '440').replace('{height}', '248');
                html += `
                    <a href="?channel=${stream.user_login}" class="stream-card" onclick="handleCardClick(event, '${stream.user_login}')">
                        <img src="${thumbnailUrl}" alt="${stream.user_name}">
                        <div class="card-info">
                            <h3>${stream.user_name}</h3>
                            <p>${stream.title}</p>
                            <span class="game-tag">🎮 ${stream.game_name || 'Just Chatting'}</span>
                            <span class="viewer-count">🔴 ${stream.viewer_count.toLocaleString()} 人正在觀看</span>
                        </div>
                    </a>
                `;
            });
            grid.innerHTML = html;
        }

        function renderQuickSwitcher(streams) {
            const menu = document.getElementById('quick-switcher-menu');
            if (!streams || streams.length === 0) {
                menu.innerHTML = '<div style="padding: 20px; text-align: center; color: #adadb8;">目前沒有人開台 😴</div>';
                return;
            }

            let html = '';
            streams.forEach(stream => {
                const thumbnailUrl = stream.thumbnail_url.replace('{width}', '160').replace('{height}', '90');
                html += `
                    <a href="?channel=${stream.user_login}" class="mini-card" onclick="handleCardClick(event, '${stream.user_login}')">
                        <img src="${thumbnailUrl}" alt="${stream.user_name}">
                        <div class="mini-info">
                            <h4>${stream.user_name}</h4>
                            <p>${stream.game_name || 'Just Chatting'}</p>
                            <span class="mini-viewers">🔴 ${stream.viewer_count.toLocaleString()}</span>
                        </div>
                    </a>
                `;
            });
            menu.innerHTML = html;
        }

        // ==========================================
        // ⭐ 下拉選單開關與防呆邏輯
        // ==========================================
        function toggleSwitcher(event) {
            // 阻擋事件冒泡，保護選單不被 document 的點擊事件秒殺
            if (event && typeof event.stopPropagation === 'function') {
                event.stopPropagation(); 
            }
            
            const menu = document.getElementById('quick-switcher-menu');
            if (menu.style.display === 'none' || menu.style.display === '') {
                menu.style.display = 'flex';
            } else {
                menu.style.display = 'none';
            }
        }

        document.addEventListener('click', function(event) {
            const menu = document.getElementById('quick-switcher-menu');
            const btn = document.getElementById('switcher-btn');
            if (menu && btn && menu.style.display === 'flex') {
                if (!menu.contains(event.target) && !btn.contains(event.target)) {
                    menu.style.display = 'none';
                }
            }
        });

        // ==========================================
        // 處理滑鼠左鍵/中鍵點擊的邏輯
        // ==========================================
        function handleHomeClick(e) {
            if (e.ctrlKey || e.metaKey || e.button === 1) return; 
            e.preventDefault(); 
            goHome();
        }

        function handleCardClick(e, channel) {
            if (e.ctrlKey || e.metaKey || e.button === 1) return;
            e.preventDefault();
            openChannel(channel);
        }

        // ==========================================

        function openChannel(channel, isFromUrl = false) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('quick-switcher-menu').style.display = 'none'; 
            
            // ⭐ 介面顯示切換
            document.getElementById('switcher-btn').style.display = 'block';
            document.getElementById('stream-info-badges').style.display = 'flex';
            
            // 隱藏「更新時間」，顯示「關閉聊天」按鈕
            document.getElementById('last-update-text').style.display = 'none'; 
            document.getElementById('toggle-chat-btn').style.display = 'block';
            
            isChatVisible = true;
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('video-container').style.height = 'calc(100vh - 60px)';
            document.getElementById('chat-container').style.display = 'block';
            
            const toggleBtn = document.getElementById('toggle-chat-btn');
            toggleBtn.innerText = '💬 關閉聊天';

            document.getElementById('video-frame').src = `https://player.twitch.tv/?channel=${channel}&parent=winsyi531.github.io`;
            document.getElementById('chat-frame').src = `https://www.twitch.tv/embed/${channel}/chat?parent=winsyi531.github.io&darkpopout`;
            
            document.title = `${channel} | Twitch 直立觀看台`;

            if (!isFromUrl) {
                const newUrl = window.location.pathname + "?channel=" + channel;
                history.pushState(null, '', newUrl);
            }
            
            updateCurrentStreamBadges();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateCurrentStreamBadges() {
            const urlParams = new URLSearchParams(window.location.search);
            const channel = urlParams.get('channel');
            if (!channel) return;

            const streamData = globalLiveStreams.find(s => s.user_login.toLowerCase() === channel.toLowerCase());
            const badgeGame = document.getElementById('badge-game');
            const badgeUptime = document.getElementById('badge-uptime');

            if (streamData) {
                badgeGame.innerText = `🎮 ${streamData.game_name || '無分類'}`;
                currentStreamStartedAt = new Date(streamData.started_at);
                calculateUptime(); 
                
                if(uptimeInterval) clearInterval(uptimeInterval);
                uptimeInterval = setInterval(calculateUptime, 60000); 
            } else {
                badgeGame.innerText = `🎮 隱藏或未開台`;
                badgeUptime.innerText = `⏱️ 未知`;
                if(uptimeInterval) clearInterval(uptimeInterval);
            }
        }

        function calculateUptime() {
            if (!currentStreamStartedAt) return;
            const now = new Date();
            const diffMs = now - currentStreamStartedAt;
            const diffMins = Math.floor(diffMs / 60000);
            const hours = Math.floor(diffMins / 60);
            const mins = diffMins % 60;
            
            const badgeUptime = document.getElementById('badge-uptime');
            if (hours > 0) {
                badgeUptime.innerText = `⏱️ 已開播 ${hours} 小時 ${mins} 分`;
            } else {
                badgeUptime.innerText = `⏱️ 已開播 ${mins} 分鐘`;
            }
        }

        function toggleChat() {
            isChatVisible = !isChatVisible;
            const chatContainer = document.getElementById('chat-container');
            const videoContainer = document.getElementById('video-container');
            const toggleBtn = document.getElementById('toggle-chat-btn');

            if (isChatVisible) {
                chatContainer.style.display = 'block';
                videoContainer.style.height = 'calc(100vh - 60px)'; 
                toggleBtn.innerText = '💬 關閉聊天';
            } else {
                chatContainer.style.display = 'none';
                videoContainer.style.height = '100vh'; 
                toggleBtn.innerText = '💬 開啟聊天';
            }
        }

        function goHome(isFromBrowserBack = false) {
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'none';
            
            // ⭐ 介面還原邏輯
            document.getElementById('switcher-btn').style.display = 'none';
            document.getElementById('stream-info-badges').style.display = 'none';
            document.getElementById('quick-switcher-menu').style.display = 'none';
            
            document.getElementById('last-update-text').style.display = 'inline-block';
            document.getElementById('toggle-chat-btn').style.display = 'none'; 
            
            if (uptimeInterval) clearInterval(uptimeInterval);
            
            document.getElementById('video-frame').src = '';
            document.getElementById('chat-frame').src = '';
            
            document.title = 'Twitch 直立觀看台 (首頁儀表板版)';

            if (!isFromBrowserBack) {
                history.pushState(null, '', window.location.pathname);
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (accessToken) fetchLiveStreams();
        }

        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const channel = urlParams.get('channel');
            if (channel) openChannel(channel, true);
            else goHome(true);
        });

        setInterval(() => {
            if (accessToken) {
                fetchLiveStreams();
            }
        }, 3 * 60 * 1000); 

    </script>
</body>
</html>
