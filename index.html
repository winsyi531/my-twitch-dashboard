<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch 直立觀看台 (終極下拉選單版)</title>
    <style>
        /* 基礎歸零與深色背景 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0e0e10;
            color: #efeff1;
            font-family: sans-serif;
            overflow: hidden; /* 徹底鎖死滾動，依賴內部容器 */
        }

        /* 頂部控制列 (維持 60px，使用 Flexbox 三等分排版) */
        #controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            background-color: #18181b;
            border-bottom: 1px solid #303032;
            height: 60px; 
            position: relative;
            z-index: 10000;
        }

        /* 左側：按鈕區 */
        .left-controls {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        /* 中間：酷炫標籤區 */
        .center-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex: 2;
            opacity: 0; /* 預設隱藏，進台後顯示 */
            transition: opacity 0.3s;
        }

        /* 右側：更新時間 */
        .right-controls {
            display: flex;
            justify-content: flex-end;
            flex: 1;
            font-size: 13px;
            color: #adadb8;
        }

        /* 統一按鈕外觀 */
        .btn {
            display: inline-block;
            padding: 8px 16px;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            text-decoration: none;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        
        #switcher-btn { background-color: #9146FF; }
        #switcher-btn:hover { background-color: #a970ff; }
        #toggle-chat-btn { background-color: #3a3a3d; }
        #toggle-chat-btn:hover { background-color: #555558; }

        /* 酷炫發光標籤 (分類 & 開台時長) */
        .cool-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            border: 1px solid;
        }
        /* 遊戲分類：科技紫光 */
        .game-badge {
            background: rgba(145, 70, 255, 0.15);
            border-color: rgba(145, 70, 255, 0.6);
            box-shadow: 0 0 8px rgba(145, 70, 255, 0.3);
            color: #e5c3ff;
        }
        /* 開台時長：警示紅光 */
        .uptime-badge {
            background: rgba(235, 4, 0, 0.15);
            border-color: rgba(235, 4, 0, 0.6);
            box-shadow: 0 0 8px rgba(235, 4, 0, 0.3);
            color: #ffb3b2;
        }

        /* 懸浮快速換台選單 (Dropdown) */
        #quick-switcher-menu {
            position: absolute;
            top: 55px; /* 貼齊按鈕下方 */
            left: 15px;
            width: 320px;
            max-height: 70vh;
            background-color: #18181b;
            border: 1px solid #464649;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            overflow-y: auto;
            z-index: 10001;
            display: none; /* 預設隱藏 */
            flex-direction: column;
        }
        
        /* 下拉選單內的實況卡片 */
        .mini-card {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #262629;
            text-decoration: none;
            color: #efeff1;
            transition: background 0.2s;
        }
        .mini-card:hover { background-color: #262629; border-left: 3px solid #9146FF; }
        .mini-card img {
            width: 80px;
            border-radius: 4px;
            margin-right: 12px;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .mini-info { flex: 1; overflow: hidden; }
        .mini-info h4 { font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-info p { font-size: 12px; color: #adadb8; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .mini-viewers { font-size: 12px; color: #eb0400; font-weight: bold; }

        /* 登入畫面置中 */
        #login-section { text-align: center; margin-top: 20vh; }

        /* 影片與聊天室區塊 */
        #video-container {
            width: 100vw;
            height: calc(100vh - 60px);
            background-color: #000;
            transition: height 0.3s ease;
        }
        #chat-container {
            width: 100vw;
            height: calc(100vh - 60px); 
            border-top: 2px solid #9146FF;
            display: none;
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* 捲軸美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3a3a3d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555558; }
    </style>
</head>
<body>

    <!-- 頂部控制列 -->
    <div id="controls">
        <div class="left-controls">
            <button id="switcher-btn" class="btn" onclick="toggleSwitcher()">🔴 其他開台清單 ▾</button>
            <button id="toggle-chat-btn" class="btn" onclick="toggleChat()" style="display: none;">💬 關閉聊天</button>
        </div>

        <div class="center-controls" id="stream-info-badges">
            <span class="cool-badge game-badge" id="badge-game">🎮 載入中</span>
            <span class="cool-badge uptime-badge" id="badge-uptime">⏱️ 計算中</span>
        </div>

        <div class="right-controls">
            <span id="last-update-text">尚未更新</span>
        </div>

        <!-- 懸浮快速換台選單 -->
        <div id="quick-switcher-menu"></div>
    </div>

    <!-- 登入區塊 (未授權時顯示) -->
    <div id="login-section">
        <h2 style="margin-bottom: 20px;">Twitch 專屬直立儀表板</h2>
        <p style="color: #adadb8; margin-bottom: 20px;">請先授權讀取追隨名單，才能啟用快速換台功能</p>
        <button class="btn" id="switcher-btn" onclick="loginTwitch()">連結 Twitch 帳號</button>
    </div>

    <!-- 影片 -->
    <div id="video-container" style="display: none;">
        <iframe id="video-frame" src="" allowfullscreen="true"></iframe>
    </div>

    <!-- 聊天室 -->
    <div id="chat-container">
        <iframe id="chat-frame" src=""></iframe>
    </div>

    <script>
        // =========================================================================
        const CLIENT_ID = 'p6qh37n16a7vomp2rufyaa3ak2a5wc'; 
        const REDIRECT_URI = 'https://winsyi531.github.io/my-twitch-dashboard/';
        // =========================================================================

        let accessToken = localStorage.getItem('twitch_token');
        let isChatVisible = true; 
        let globalLiveStreams = []; // 儲存目前的開台資料
        let currentStreamStartedAt = null; // 記錄目前觀看實況的開播時間
        let uptimeInterval = null; // 計時器

        const hash = window.location.hash;
        if (hash.includes('access_token=')) {
            accessToken = new URLSearchParams(hash.substring(1)).get('access_token');
            localStorage.setItem('twitch_token', accessToken);
            history.replaceState(null, '', window.location.pathname + window.location.search);
        }

        // 啟動邏輯
        if (accessToken) {
            document.getElementById('login-section').style.display = 'none';
            fetchLiveStreams().then(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const targetChannel = urlParams.get('channel');
                if (targetChannel) {
                    openChannel(targetChannel, true);
                } else {
                    // 如果沒有指定頻道，自動打開選單讓你選
                    toggleSwitcher(true); 
                }
            });
        }

        function loginTwitch() {
            if (CLIENT_ID === '這裡填入你的_CLIENT_ID') return alert("請設定 CLIENT_ID！");
            window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=user:read:follows`;
        }

        // 獲取實況資料
        async function fetchLiveStreams() {
            try {
                const userRes = await fetch('https://api.twitch.tv/helix/users', {
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': CLIENT_ID }
                });
                if (!userRes.ok) throw new Error('Token 錯誤');
                const userData = await userRes.json();
                const userId = userData.data[0].id;

                const streamsRes = await fetch(`https://api.twitch.tv/helix/streams/followed?user_id=${userId}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': CLIENT_ID }
                });
                const streamsData = await streamsRes.json();
                
                globalLiveStreams = streamsData.data;
                renderQuickSwitcher(globalLiveStreams);

                // 更新右上角的視覺回饋時間
                const now = new Date();
                const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                document.getElementById('last-update-text').innerHTML = `🔄 最後更新於 ${timeString}`;
                
                // 如果目前正在看某台，順便刷新一下他的標籤資訊
                updateCurrentStreamBadges();

            } catch (error) {
                console.error(error);
                localStorage.removeItem('twitch_token');
                document.getElementById('login-section').style.display = 'block';
            }
        }

        // 渲染下拉選單
        function renderQuickSwitcher(streams) {
            const menu = document.getElementById('quick-switcher-menu');
            if (!streams || streams.length === 0) {
                menu.innerHTML = '<div style="padding: 20px; text-align: center; color: #adadb8;">目前沒有人開台 😴</div>';
                return;
            }

            let html = '';
            streams.forEach(stream => {
                const thumbnailUrl = stream.thumbnail_url.replace('{width}', '160').replace('{height}', '90');
                html += `
                    <a href="?channel=${stream.user_login}" class="mini-card" onclick="handleCardClick(event, '${stream.user_login}')">
                        <img src="${thumbnailUrl}" alt="${stream.user_name}">
                        <div class="mini-info">
                            <h4>${stream.user_name}</h4>
                            <p>${stream.game_name || 'Just Chatting'}</p>
                            <span class="mini-viewers">🔴 ${stream.viewer_count.toLocaleString()}</span>
                        </div>
                    </a>
                `;
            });
            menu.innerHTML = html;
        }

        // 開關下拉選單
        function toggleSwitcher(forceOpen = false) {
            const menu = document.getElementById('quick-switcher-menu');
            if (forceOpen || menu.style.display === 'none' || menu.style.display === '') {
                menu.style.display = 'flex';
            } else {
                menu.style.display = 'none';
            }
        }

        // 點擊網頁空白處自動關閉下拉選單
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('quick-switcher-menu');
            const btn = document.getElementById('switcher-btn');
            if (menu.style.display === 'flex' && !menu.contains(event.target) && event.target !== btn) {
                menu.style.display = 'none';
            }
        });

        function handleCardClick(e, channel) {
            if (e.ctrlKey || e.metaKey || e.button === 1) return;
            e.preventDefault();
            openChannel(channel);
        }

        function openChannel(channel, isFromUrl = false) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('quick-switcher-menu').style.display = 'none'; // 關閉選單
            
            isChatVisible = true;
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('video-container').style.height = '60vh'; // 預設 60% 高度
            document.getElementById('chat-container').style.display = 'block';
            document.getElementById('chat-container').style.height = '40vh'; // 聊天室 40% 高度
            
            const toggleBtn = document.getElementById('toggle-chat-btn');
            toggleBtn.style.display = 'block';
            toggleBtn.innerText = '💬 關閉聊天';

            document.getElementById('video-frame').src = `https://player.twitch.tv/?channel=${channel}&parent=winsyi531.github.io`;
            document.getElementById('chat-frame').src = `https://www.twitch.tv/embed/${channel}/chat?parent=winsyi531.github.io&darkpopout`;
            
            document.title = `${channel} | Twitch 直立觀看台`;

            if (!isFromUrl) {
                history.pushState(null, '', window.location.pathname + "?channel=" + channel);
            }
            
            // 更新並顯示中間的酷炫標籤
            document.getElementById('stream-info-badges').style.opacity = '1';
            updateCurrentStreamBadges();
        }

        // 更新酷炫標籤資訊 (開播時間與分類)
        function updateCurrentStreamBadges() {
            const urlParams = new URLSearchParams(window.location.search);
            const channel = urlParams.get('channel');
            if (!channel) return;

            // 從 globalLiveStreams 尋找該頻道的資料
            const streamData = globalLiveStreams.find(s => s.user_login.toLowerCase() === channel.toLowerCase());
            
            const badgeGame = document.getElementById('badge-game');
            const badgeUptime = document.getElementById('badge-uptime');

            if (streamData) {
                badgeGame.innerText = `🎮 ${streamData.game_name || '無分類'}`;
                currentStreamStartedAt = new Date(streamData.started_at);
                calculateUptime(); // 立刻算一次
                
                // 設定每秒更新一次開台時間
                if(uptimeInterval) clearInterval(uptimeInterval);
                uptimeInterval = setInterval(calculateUptime, 60000); // 每分鐘更新
            } else {
                badgeGame.innerText = `🎮 隱藏或離線`;
                badgeUptime.innerText = `⏱️ 未知`;
                if(uptimeInterval) clearInterval(uptimeInterval);
            }
        }

        // 計算開播時長
        function calculateUptime() {
            if (!currentStreamStartedAt) return;
            const now = new Date();
            const diffMs = now - currentStreamStartedAt;
            const diffMins = Math.floor(diffMs / 60000);
            const hours = Math.floor(diffMins / 60);
            const mins = diffMins % 60;
            
            const badgeUptime = document.getElementById('badge-uptime');
            if (hours > 0) {
                badgeUptime.innerText = `⏱️ 已開播 ${hours} 小時 ${mins} 分`;
            } else {
                badgeUptime.innerText = `⏱️ 已開播 ${mins} 分鐘`;
            }
        }

        function toggleChat() {
            isChatVisible = !isChatVisible;
            const chatContainer = document.getElementById('chat-container');
            const videoContainer = document.getElementById('video-container');
            const toggleBtn = document.getElementById('toggle-chat-btn');

            if (isChatVisible) {
                chatContainer.style.display = 'block';
                videoContainer.style.height = '60vh'; 
                toggleBtn.innerText = '💬 關閉聊天';
            } else {
                chatContainer.style.display = 'none';
                videoContainer.style.height = 'calc(100vh - 60px)'; // 關閉聊天室時，影片補滿下方空間
                toggleBtn.innerText = '💬 開啟聊天';
            }
        }

        // 支援瀏覽器上一頁/下一頁
        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const channel = urlParams.get('channel');
            if (channel) openChannel(channel, true);
        });

        // 首頁背景自動更新 (每 3 分鐘)
        setInterval(() => {
            if (accessToken) {
                fetchLiveStreams();
            }
        }, 3 * 60 * 1000); 

    </script>
</body>
</html>
