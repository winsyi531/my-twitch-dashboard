<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch 直立觀看台</title>
    
    <!-- ⭐ 引入 Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* 基礎歸零與深色背景 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #0e0e10;
            color: #efeff1;
            font-family: sans-serif;
            overflow: hidden; 
            height: 100vh;
            width: 100%;
        }

        /* 頂部控制列 */
        #controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            background-color: rgba(24, 24, 27, 0.7); 
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #303032;
            height: 60px; 
            position: relative;
            z-index: 10000;
            flex-wrap: nowrap; 
        }

        .left-controls { display: flex; gap: 10px; flex: 1; align-items: center; white-space: nowrap; }
        .center-controls { display: flex; gap: 12px; flex: 2; justify-content: center; align-items: center; white-space: nowrap; }
        .right-controls { display: flex; gap: 10px; flex: 1; justify-content: flex-end; align-items: center; white-space: nowrap; }

        .btn {
            display: inline-flex; 
            align-items: center;
            gap: 6px; 
            padding: 8px 16px;
            background-color: #9146FF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none; 
            transition: background-color 0.2s;
            line-height: normal;
            white-space: nowrap; 
            flex-shrink: 0;
        }
        .btn:hover { background-color: #a970ff; }
        .btn i { font-size: 18px; } 
        
        #home-btn { background-color: #3a3a3d; }
        #home-btn:hover { background-color: #555558; }
        #switcher-btn { background-color: #9146FF; }
        #toggle-chat-btn { background-color: #3a3a3d; }

        .cool-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid;
            flex-shrink: 0;
        }
        /* 字卡配色優化 */
        .game-badge { background: rgba(145, 70, 255, 0.15); border-color: rgba(145, 70, 255, 0.6); color: #e5c3ff; box-shadow: 0 0 8px rgba(145, 70, 255, 0.3); }
        .uptime-badge { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.3); color: #efeff1; }
        .viewer-badge { background: rgba(235, 4, 0, 0.15); border-color: rgba(235, 4, 0, 0.6); color: #ffb3b2; box-shadow: 0 0 8px rgba(235, 4, 0, 0.3); }

        #quick-switcher-menu {
            position: fixed; 
            top: 60px; 
            left: 15px; 
            width: 300px;
            max-height: 60vh;
            background-color: rgba(24, 24, 27, 0.8); 
            backdrop-filter: blur(15px);
            border: 1px solid #464649;
            border-top: none;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            overflow-y: auto;
            z-index: 99999;
            display: none; 
            flex-direction: column;
        }
        .mini-card {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #262629;
            text-decoration: none;
            color: #efeff1;
            transition: background 0.2s;
        }
        .mini-card:hover { background-color: rgba(145, 70, 255, 0.2); border-left: 3px solid #9146FF; }
        .mini-card img { width: 80px; border-radius: 4px; margin-right: 12px; aspect-ratio: 16/9; object-fit: cover; }
        .mini-info { flex: 1; overflow: hidden; }
        .mini-info h4 { font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-info p { font-size: 12px; color: #adadb8; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .mini-viewers { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #eb0400; font-weight: bold; }

        #home-screen { 
            width: 100%; 
            height: calc(100vh - 60px); 
            padding: 30px; 
            display: block; 
            overflow-y: auto; 
        }
        #last-update-text { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #adadb8; white-space: nowrap; flex-shrink: 0; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .stream-card {
            background: #18181b; border-radius: 8px; overflow: hidden; cursor: pointer;
            transition: transform 0.2s; border: 1px solid transparent; text-decoration: none; 
            color: inherit; display: block;
        }
        .stream-card:hover { transform: translateY(-5px); border: 1px solid #9146FF; }
        .stream-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-info h3 { margin-bottom: 5px; font-size: 18px; }
        .card-info p { color: #adadb8; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-tag { display: inline-flex; align-items: center; gap: 4px; background-color: #3a3a3d; color: #efeff1; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-top: 8px; margin-right: 8px; }
        .viewer-count { display: inline-flex; align-items: center; gap: 4px; color: #eb0400 !important; font-weight: bold; margin-top: 8px; }

        #video-container { 
            width: 100%; 
            height: calc(100vh - 60px); 
            background-color: #000; 
            display: none; 
            overflow: hidden;
        }

        #chat-container { 
            position: fixed;
            top: 60px;
            right: 0;
            width: 350px; 
            max-width: 85vw; 
            height: calc(100vh - 60px); 
            background-color: #0e0e10;
            border-left: 1px solid #303032;
            z-index: 9999;
            transform: translateX(100%); 
            transition: transform 0.3s ease-in-out; 
            display: none; 
        }
        
        iframe { width: 100%; height: 100%; border: none; }
        .login-wrapper { text-align: center; margin-top: 15vh; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3a3a3d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9146FF; }
    </style>
</head>
<body>

    <div id="controls">
        <div class="left-controls">
            <a href="?" id="home-btn" class="btn" onclick="handleHomeClick(event)">
                <i class="ph-fill ph-house"></i> 回首頁
            </a>
            <button id="switcher-btn" class="btn" onclick="toggleSwitcher(event)" style="display: none;">
                <i class="ph-fill ph-monitor-play"></i> 其他開台清單 <i class="ph-bold ph-caret-down"></i>
            </button>
        </div>

        <!-- ⭐ 字卡區塊更新：新增觀眾人數標籤 -->
        <div class="center-controls" id="stream-info-badges" style="display: none;">
            <span class="cool-badge game-badge" id="badge-game">
                <i class="ph-fill ph-game-controller"></i> 載入中
            </span>
            <span class="cool-badge uptime-badge" id="badge-uptime">
                <i class="ph-fill ph-clock"></i> 計算中
            </span>
            <span class="cool-badge viewer-badge" id="badge-viewer">
                <i class="ph-fill ph-users"></i> 0
            </span>
        </div>

        <div class="right-controls">
            <span id="last-update-text">
                <i class="ph-bold ph-arrows-clockwise"></i> 尚未更新
            </span>
            <button id="toggle-chat-btn" class="btn" onclick="toggleChat()" style="display: none;">
                <i class="ph-fill ph-chat-teardrop-text"></i> 開啟聊天
            </button>
        </div>
    </div>

    <div id="quick-switcher-menu"></div>

    <div id="home-screen">
        <div class="login-wrapper" id="login-section">
            <h2 style="margin-bottom: 20px;">需要授權才能讀取你的追隨名單</h2>
            <button class="btn" onclick="loginTwitch()">
                <i class="ph-fill ph-twitch-logo"></i> 連結 Twitch 帳號
            </button>
        </div>
        <div id="live-streams-grid" class="grid-container"></div>
    </div>

    <div id="video-container">
        <iframe id="video-frame" src="" allowfullscreen="true"></iframe>
    </div>

    <div id="chat-container">
        <iframe id="chat-frame" src=""></iframe>
    </div>

    <script>
        // =========================================================================
        const CLIENT_ID = 'p6qh37n16a7vomp2rufyaa3ak2a5wc'; 
        const REDIRECT_URI = 'https://winsyi531.github.io/my-twitch-dashboard/';
        // =========================================================================

        let accessToken = localStorage.getItem('twitch_token');
        let isChatVisible = false; 
        let globalLiveStreams = []; 
        let currentStreamStartedAt = null; 
        let uptimeInterval = null; 

        const hash = window.location.hash;
        if (hash.includes('access_token=')) {
            accessToken = new URLSearchParams(hash.substring(1)).get('access_token');
            localStorage.setItem('twitch_token', accessToken);
            history.replaceState(null, '', window.location.pathname + window.location.search);
        }

        if (accessToken) {
            document.getElementById('login-section').style.display = 'none';
            const urlParams = new URLSearchParams(window.location.search);
            const targetChannel = urlParams.get('channel');
            fetchLiveStreams().then(() => {
                if (targetChannel) openChannel(targetChannel, true);
            });
        }

        function loginTwitch() {
            if (CLIENT_ID === '這裡填入你的_CLIENT_ID') return alert("請設定 CLIENT_ID！");
            window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=user:read:follows`;
        }

        async function fetchLiveStreams() {
            try {
                const userRes = await fetch('https://api.twitch.tv/helix/users', {
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': CLIENT_ID }
                });
                if (!userRes.ok) throw new Error('Token 可能過期了');
                const userData = await userRes.json();
                const userId = userData.data[0].id;

                const streamsRes = await fetch(`https://api.twitch.tv/helix/streams/followed?user_id=${userId}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Client-Id': CLIENT_ID }
                });
                const streamsData = await streamsRes.json();
                globalLiveStreams = streamsData.data; 
                
                renderGrid(globalLiveStreams);
                renderQuickSwitcher(globalLiveStreams);
                
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                document.getElementById('last-update-text').innerHTML = `<i class="ph-bold ph-arrows-clockwise"></i> 最後更新於 ${timeStr}`;

                if (document.getElementById('video-container').style.display === 'block') {
                    updateCurrentStreamBadges();
                }
            } catch (error) {
                console.error("API 錯誤:", error);
                localStorage.removeItem('twitch_token');
                document.getElementById('login-section').style.display = 'block';
            }
        }

        function renderGrid(streams) {
            const grid = document.getElementById('live-streams-grid');
            if (!streams || streams.length === 0) {
                grid.innerHTML = '<h3 style="grid-column: 1 / -1; text-align: center; color: #adadb8; margin-top: 50px;">目前沒有追隨的實況主在線上 😴</h3>';
                return;
            }
            let html = '';
            streams.forEach(stream => {
                const thumbnailUrl = stream.thumbnail_url.replace('{width}', '440').replace('{height}', '248');
                html += `
                    <a href="?channel=${stream.user_login}" class="stream-card" onclick="handleCardClick(event, '${stream.user_login}')">
                        <img src="${thumbnailUrl}" alt="${stream.user_name}">
                        <div class="card-info">
                            <h3>${stream.user_name}</h3>
                            <p>${stream.title}</p>
                            <span class="game-tag"><i class="ph-fill ph-game-controller"></i> ${stream.game_name || 'Just Chatting'}</span>
                            <span class="viewer-count"><i class="ph-fill ph-users"></i> ${stream.viewer_count.toLocaleString()}</span>
                        </div>
                    </a>
                `;
            });
            grid.innerHTML = html;
        }

        function renderQuickSwitcher(streams) {
            const menu = document.getElementById('quick-switcher-menu');
            if (!streams || streams.length === 0) {
                menu.innerHTML = '<div style="padding: 20px; text-align: center; color: #adadb8;">目前沒有人開台 😴</div>';
                return;
            }
            let html = '';
            streams.forEach(stream => {
                const thumbnailUrl = stream.thumbnail_url.replace('{width}', '160').replace('{height}', '90');
                html += `
                    <a href="?channel=${stream.user_login}" class="mini-card" onclick="handleCardClick(event, '${stream.user_login}')">
                        <img src="${thumbnailUrl}" alt="${stream.user_name}">
                        <div class="mini-info">
                            <h4>${stream.user_name}</h4>
                            <p>${stream.game_name || 'Just Chatting'}</p>
                            <span class="mini-viewers"><i class="ph-fill ph-users"></i> ${stream.viewer_count.toLocaleString()}</span>
                        </div>
                    </a>
                `;
            });
            menu.innerHTML = html;
        }

        function toggleSwitcher(event) {
            if(event) event.stopPropagation(); 
            const menu = document.getElementById('quick-switcher-menu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        document.addEventListener('click', function(event) {
            const menu = document.getElementById('quick-switcher-menu');
            const btn = document.getElementById('switcher-btn');
            if (menu && btn && menu.style.display === 'flex') {
                if (!menu.contains(event.target) && !btn.contains(event.target)) {
                    menu.style.display = 'none';
                }
            }
        });

        function handleHomeClick(e) {
            if (e.ctrlKey || e.metaKey || e.button === 1) return; 
            e.preventDefault(); 
            goHome();
        }

        function handleCardClick(e, channel) {
            if (e.ctrlKey || e.metaKey || e.button === 1) return;
            e.preventDefault();
            openChannel(channel);
        }

        function openChannel(channel, isFromUrl = false) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('quick-switcher-menu').style.display = 'none'; 
            document.getElementById('switcher-btn').style.display = 'flex';
            document.getElementById('stream-info-badges').style.display = 'flex';
            document.getElementById('last-update-text').style.display = 'none'; 
            document.getElementById('toggle-chat-btn').style.display = 'flex';
            
            isChatVisible = false;
            document.getElementById('video-container').style.display = 'block';
            
            const chatContainer = document.getElementById('chat-container');
            chatContainer.style.display = 'block'; 
            chatContainer.style.transform = 'translateX(100%)'; 
            
            document.getElementById('toggle-chat-btn').innerHTML = '<i class="ph-fill ph-chat-teardrop-text"></i> 開啟聊天';
            document.getElementById('video-frame').src = `https://player.twitch.tv/?channel=${channel}&parent=winsyi531.github.io`;
            // 在 openChannel 函式中修改這一行
document.getElementById('chat-frame').src = `https://www.twitch.tv/embed/${channel}/chat?parent=winsyi531.github.io`;
            
            const streamData = globalLiveStreams.find(s => s.user_login.toLowerCase() === channel.toLowerCase());
            document.title = `${streamData ? streamData.user_name : channel} | Twitch 直立觀看台`;

            if (!isFromUrl) history.pushState(null, '', window.location.pathname + "?channel=" + channel);
            updateCurrentStreamBadges();
        }

        // ⭐ 函式更新：同時抓取人數資料
        function updateCurrentStreamBadges() {
            const urlParams = new URLSearchParams(window.location.search);
            const channel = urlParams.get('channel');
            if (!channel) return;
            const streamData = globalLiveStreams.find(s => s.user_login.toLowerCase() === channel.toLowerCase());
            if (streamData) {
                document.getElementById('badge-game').innerHTML = `<i class="ph-fill ph-game-controller"></i> ${streamData.game_name || '無分類'}`;
                document.getElementById('badge-viewer').innerHTML = `<i class="ph-fill ph-users"></i> ${streamData.viewer_count.toLocaleString()}`;
                
                currentStreamStartedAt = new Date(streamData.started_at);
                calculateUptime(); 
                if(uptimeInterval) clearInterval(uptimeInterval);
                uptimeInterval = setInterval(calculateUptime, 60000); 
            }
        }

        function calculateUptime() {
            if (!currentStreamStartedAt) return;
            const diffMins = Math.floor((new Date() - currentStreamStartedAt) / 60000);
            const hours = Math.floor(diffMins / 60);
            const mins = diffMins % 60;
            document.getElementById('badge-uptime').innerHTML = `<i class="ph-fill ph-clock"></i> 已開播 ${hours}時${mins}分`;
        }

        function toggleChat() {
            isChatVisible = !isChatVisible;
            const chatContainer = document.getElementById('chat-container');
            const toggleBtn = document.getElementById('toggle-chat-btn');
            chatContainer.style.transform = isChatVisible ? 'translateX(0)' : 'translateX(100%)'; 
            toggleBtn.innerHTML = isChatVisible ? '<i class="ph-fill ph-chat-teardrop-slash"></i> 關閉聊天' : '<i class="ph-fill ph-chat-teardrop-text"></i> 開啟聊天';
        }

        function goHome(isFromBrowserBack = false) {
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'none';
            document.getElementById('switcher-btn').style.display = 'none';
            document.getElementById('stream-info-badges').style.display = 'none';
            document.getElementById('quick-switcher-menu').style.display = 'none';
            document.getElementById('last-update-text').style.display = 'flex';
            document.getElementById('toggle-chat-btn').style.display = 'none'; 
            if (uptimeInterval) clearInterval(uptimeInterval);
            document.getElementById('video-frame').src = '';
            document.getElementById('chat-frame').src = '';
            document.title = 'Twitch 直立觀看台';
            if (!isFromBrowserBack) history.pushState(null, '', window.location.pathname);
            if (accessToken) fetchLiveStreams();
        }

        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const channel = urlParams.get('channel');
            if (channel) openChannel(channel, true);
            else goHome(true);
        });

        setInterval(() => { if (accessToken) fetchLiveStreams(); }, 3 * 60 * 1000); 
    </script>
</body>
</html>
